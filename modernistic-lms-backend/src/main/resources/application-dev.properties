# Dev profile - uses H2 file-based DB (persists between restarts, no MySQL required)
spring.datasource.url=jdbc:h2:file:./data/modernisticlms;AUTO_SERVER=TRUE;MODE=MySQL;NON_KEYWORDS=DAY,TYPE,MONTH,VALUE,KEY,HOUR,MINUTE,SECOND,YEAR,DATE,TIME,TIMESTAMP
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
