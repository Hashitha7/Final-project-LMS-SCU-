spring.application.name=modernistic-lms-backend
server.port=8080

# --- MySQL Configuration (advance_lms database) ---
spring.datasource.url=jdbc:mysql://localhost:3306/modernistic_lms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# JWT Configuration
modernisticlms.app.jwtSecret=EdusparkSecretKeyForJwtAuthenticationShouldBeLongEnoughToBeeSecure1234567890
modernisticlms.app.jwtExpirationMs=86400000

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.modernisticlms.backend=DEBUG
